<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <link rel="icon" href="favicon.svg" type="image/svg+xml" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Projects — Shelvia</title>
  <meta name="description" content="Personal projects — a collection of personal projects." />
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=Playfair+Display:wght@700;800&family=Inter:wght@400;500;600&family=JetBrains+Mono:wght@400;500&display=swap" rel="stylesheet" />
  <link rel="stylesheet" href="styles/main.css" />
</head>
<body>

  <div id="shell-nav"></div>
  <div id="shell-drawer"></div>

  <!-- Page hero -->
  <header class="listing-hero">
    <div class="orb orb-pink"     style="width:580px;height:480px;top:-100px;right:-120px;opacity:0.38;" aria-hidden="true"></div>
    <div class="orb orb-gold"     style="width:320px;height:320px;top:60px;left:5%;opacity:0.20;"        aria-hidden="true"></div>
    <div class="orb orb-lavender" style="width:260px;height:260px;bottom:-40px;left:40%;opacity:0.18;"   aria-hidden="true"></div>
    <div class="container">
      <div class="listing-hero-content">
        <p class="section-label">Projects</p>
        <h1 class="listing-title gradient-text-pink">Personal Projects</h1>
        <p class="listing-subtitle">
          A collection of side projects where I bring my creative ideas to life.
        </p>
      </div>
    </div>
  </header>

  <!-- List -->
  <section class="section list-section" style="padding-top:2rem;">
    <div class="container">
      <div class="item-list" id="projects-list" role="list"></div>
    </div>
  </section>

  <div id="shell-footer"></div>

  <template id="arrow-svg">
    <svg class="item-arrow" width="14" height="14" viewBox="0 0 14 14" fill="none" aria-hidden="true">
      <path d="M1 7h12M7 1l6 6-6 6" stroke="currentColor" stroke-width="1.6" stroke-linecap="round" stroke-linejoin="round"/>
    </svg>
  </template>

  <script>window.SHELL_BASE = './';</script>
  <script src="scripts/shell.js"></script>
  <script src="data/content.js"></script>
  <script src="scripts/list.js"></script>
  <script>
    renderItemList(PROJECTS, 'projects-list', 'project');
  </script>
  <script src="scripts/main.js"></script>
</body>
</html>
