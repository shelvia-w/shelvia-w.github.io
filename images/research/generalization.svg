    <circle cx="210" cy="740" r="1.6" fill="#FFE08A"/>
  </g>

  <g filter="url(#softGlow)" opacity="0.95">
    <path d="M320 595C420 560 494 498 575 447C656 396 745 355 832 364C942 375 996 462 1102 452C1184 444 1248 385 1315 312"
