<svg width="1600" height="900" viewBox="0 0 1600 900" fill="none" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="1600" y2="900" gradientUnits="userSpaceOnUse">
      <stop offset="0" stop-color="#070B1A"/>
      <stop offset="0.45" stop-color="#101633"/>
      <stop offset="1" stop-color="#140B2A"/>
    </linearGradient>

    <radialGradient id="glowA" cx="0" cy="0" r="1" gradientUnits="userSpaceOnUse" gradientTransform="translate(480 420) rotate(90) scale(320 420)">
      <stop offset="0" stop-color="#7CF7FF" stop-opacity="0.26"/>
      <stop offset="1" stop-color="#7CF7FF" stop-opacity="0"/>
    </radialGradient>

    <radialGradient id="glowB" cx="0" cy="0" r="1" gradientUnits="userSpaceOnUse" gradientTransform="translate(1150 470) rotate(90) scale(360 460)">
      <stop offset="0" stop-color="#FF77E1" stop-opacity="0.2"/>
      <stop offset="1" stop-color="#FF77E1" stop-opacity="0"/>
    </radialGradient>

    <linearGradient id="curve" x1="320" y1="590" x2="1310" y2="310" gradientUnits="userSpaceOnUse">
      <stop offset="0" stop-color="#62F3FF"/>
      <stop offset="0.28" stop-color="#7B8CFF"/>
      <stop offset="0.52" stop-color="#C66BFF"/>
      <stop offset="0.74" stop-color="#FF73C8"/>
      <stop offset="1" stop-color="#FFD76A"/>
    </linearGradient>

    <linearGradient id="thread1" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0" stop-color="#6CF8FF"/>
      <stop offset="1" stop-color="#9F7BFF"/>
    </linearGradient>

    <linearGradient id="thread2" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0" stop-color="#FF8BD8"/>
      <stop offset="1" stop-color="#FFD86C"/>
    </linearGradient>

    <filter id="softGlow" x="-50%" y="-50%" width="200%" height="200%">
      <feGaussianBlur stdDeviation="12" result="blur"/>
      <feMerge>
        <feMergeNode in="blur"/>
        <feMergeNode in="SourceGraphic"/>
      </feMerge>
    </filter>

    <filter id="nodeGlow" x="-200%" y="-200%" width="400%" height="400%">
      <feGaussianBlur stdDeviation="8" result="blur"/>
      <feMerge>
        <feMergeNode in="blur"/>
        <feMergeNode in="SourceGraphic"/>
      </feMerge>
    </filter>
  </defs>

  <rect width="1600" height="900" fill="url(#bg)"/>
  <rect width="1600" height="900" fill="url(#glowA)"/>
  <rect width="1600" height="900" fill="url(#glowB)"/>

  <g opacity="0.45">
