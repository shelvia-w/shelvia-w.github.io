    <circle cx="800" cy="231" r="26" stroke="#D9C8FF" stroke-opacity="0.35" stroke-width="2.5"/>
    <circle cx="675" cy="520" r="8" fill="#79F7FF"/>
    <circle cx="925" cy="520" r="8" fill="#FF8AE8"/>
    <circle cx="430" cy="710" r="5" fill="#79F7FF" fill-opacity="0.9"/>
    <circle cx="800" cy="710" r="5.5" fill="#C7B8FF" fill-opacity="0.92"/>
    <circle cx="1170" cy="710" r="5" fill="#FF8AE8" fill-opacity="0.9"/>
  </g>

  <g opacity="0.34">
    <path d="M150 470C198 430 250 414 315 420" stroke="#76F7FF" stroke-width="2.3" stroke-linecap="round"/>
    <path d="M1285 424C1350 416 1402 432 1450 472" stroke="#FF86E7" stroke-width="2.3" stroke-linecap="round"/>
    <circle cx="166" cy="470" r="50" stroke="#76F7FF" stroke-opacity="0.34" stroke-width="1.6"/>
