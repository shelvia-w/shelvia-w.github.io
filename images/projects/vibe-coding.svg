<svg width="1600" height="900" viewBox="0 0 1600 900" fill="none" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="1600" y2="900" gradientUnits="userSpaceOnUse">
      <stop offset="0" stop-color="#070B1D"/>
      <stop offset="0.52" stop-color="#111735"/>
      <stop offset="1" stop-color="#190E2D"/>
    </linearGradient>

    <radialGradient id="glowLeft" cx="0" cy="0" r="1" gradientUnits="userSpaceOnUse" gradientTransform="translate(430 430) rotate(90) scale(360 430)">
      <stop offset="0" stop-color="#65F5FF" stop-opacity="0.18"/>
      <stop offset="1" stop-color="#65F5FF" stop-opacity="0"/>
    </radialGradient>

    <radialGradient id="glowRight" cx="0" cy="0" r="1" gradientUnits="userSpaceOnUse" gradientTransform="translate(1160 420) rotate(90) scale(390 450)">
      <stop offset="0" stop-color="#FF7BDC" stop-opacity="0.16"/>
      <stop offset="1" stop-color="#FF7BDC" stop-opacity="0"/>
    </radialGradient>

    <linearGradient id="frameStroke" x1="450" y1="240" x2="1140" y2="700" gradientUnits="userSpaceOnUse">
      <stop offset="0" stop-color="#63F3FF"/>
      <stop offset="0.35" stop-color="#7D8DFF"/>
      <stop offset="0.68" stop-color="#E272FF"/>
      <stop offset="1" stop-color="#FFD86D"/>
    </linearGradient>

    <linearGradient id="codeLineA" x1="0" y1="0" x2="1" y2="0">
      <stop offset="0" stop-color="#6FF5FF"/>
      <stop offset="1" stop-color="#9D82FF"/>
    </linearGradient>

    <linearGradient id="codeLineB" x1="0" y1="0" x2="1" y2="0">
      <stop offset="0" stop-color="#FF84DE"/>
      <stop offset="1" stop-color="#FFD86F"/>
    </linearGradient>

    <linearGradient id="flow" x1="480" y1="680" x2="1160" y2="290" gradientUnits="userSpaceOnUse">
      <stop offset="0" stop-color="#62F3FF"/>
      <stop offset="0.28" stop-color="#7E8CFF"/>
      <stop offset="0.52" stop-color="#C96CFF"/>
      <stop offset="0.76" stop-color="#FF7FD4"/>
      <stop offset="1" stop-color="#FFD86B"/>
    </linearGradient>

    <filter id="softGlow" x="-50%" y="-50%" width="200%" height="200%">
      <feGaussianBlur stdDeviation="14" result="blur"/>
      <feMerge>
        <feMergeNode in="blur"/>
        <feMergeNode in="SourceGraphic"/>
      </feMerge>
    </filter>

    <filter id="nodeGlow" x="-200%" y="-200%" width="400%" height="400%">
      <feGaussianBlur stdDeviation="8" result="blur"/>
      <feMerge>
        <feMergeNode in="blur"/>
        <feMergeNode in="SourceGraphic"/>
      </feMerge>
    </filter>
  </defs>

  <rect width="1600" height="900" fill="url(#bg)"/>
  <rect width="1600" height="900" fill="url(#glowLeft)"/>
  <rect width="1600" height="900" fill="url(#glowRight)"/>

