<svg width="1600" height="900" viewBox="0 0 1600 900" fill="none" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="1600" y2="900" gradientUnits="userSpaceOnUse">
      <stop offset="0" stop-color="#070B1A"/>
      <stop offset="0.48" stop-color="#101633"/>
      <stop offset="1" stop-color="#180D2D"/>
    </linearGradient>

    <radialGradient id="glowLeft" cx="0" cy="0" r="1" gradientUnits="userSpaceOnUse" gradientTransform="translate(450 430) rotate(90) scale(360 430)">
      <stop offset="0" stop-color="#72F7FF" stop-opacity="0.25"/>
      <stop offset="1" stop-color="#72F7FF" stop-opacity="0"/>
    </radialGradient>

    <radialGradient id="glowRight" cx="0" cy="0" r="1" gradientUnits="userSpaceOnUse" gradientTransform="translate(1140 450) rotate(90) scale(380 470)">
      <stop offset="0" stop-color="#FF78DB" stop-opacity="0.19"/>
      <stop offset="1" stop-color="#FF78DB" stop-opacity="0"/>
    </radialGradient>

    <radialGradient id="glowGold" cx="0" cy="0" r="1" gradientUnits="userSpaceOnUse" gradientTransform="translate(810 690) rotate(90) scale(230 500)">
      <stop offset="0" stop-color="#FFD86E" stop-opacity="0.12"/>
      <stop offset="1" stop-color="#FFD86E" stop-opacity="0"/>
    </radialGradient>

    <linearGradient id="mainStroke" x1="470" y1="210" x2="1130" y2="700" gradientUnits="userSpaceOnUse">
      <stop offset="0" stop-color="#63F3FF"/>
      <stop offset="0.30" stop-color="#7F8CFF"/>
      <stop offset="0.56" stop-color="#D66CFF"/>
      <stop offset="0.80" stop-color="#FF7ED6"/>
      <stop offset="1" stop-color="#FFD86D"/>
    </linearGradient>

    <linearGradient id="cyanViolet" x1="470" y1="300" x2="790" y2="610" gradientUnits="userSpaceOnUse">
      <stop offset="0" stop-color="#6EF6FF"/>
      <stop offset="1" stop-color="#9D82FF"/>
    </linearGradient>

    <linearGradient id="pinkGold" x1="780" y1="285" x2="1130" y2="650" gradientUnits="userSpaceOnUse">
      <stop offset="0" stop-color="#FF82DE"/>
      <stop offset="1" stop-color="#FFD86F"/>
    </linearGradient>

    <linearGradient id="violetPink" x1="590" y1="210" x2="1060" y2="710" gradientUnits="userSpaceOnUse">
      <stop offset="0" stop-color="#7C8FFF"/>
      <stop offset="0.55" stop-color="#D86CFF"/>
      <stop offset="1" stop-color="#FF86D6"/>
    </linearGradient>

    <linearGradient id="thread" x1="260" y1="640" x2="1350" y2="260" gradientUnits="userSpaceOnUse">
      <stop offset="0" stop-color="#62F3FF"/>
      <stop offset="0.35" stop-color="#7F8CFF"/>
      <stop offset="0.65" stop-color="#FF7DDA"/>
      <stop offset="1" stop-color="#FFD86C"/>
    </linearGradient>

    <filter id="softGlow" x="-50%" y="-50%" width="200%" height="200%">
      <feGaussianBlur stdDeviation="14" result="blur"/>
      <feMerge>
        <feMergeNode in="blur"/>
        <feMergeNode in="SourceGraphic"/>
      </feMerge>
    </filter>

    <filter id="pieceGlow" x="-60%" y="-60%" width="220%" height="220%">
      <feGaussianBlur stdDeviation="10" result="blur"/>
      <feMerge>
        <feMergeNode in="blur"/>
        <feMergeNode in="SourceGraphic"/>
      </feMerge>
    </filter>

    <filter id="nodeGlow" x="-200%" y="-200%" width="400%" height="400%">
      <feGaussianBlur stdDeviation="8" result="blur"/>
      <feMerge>
        <feMergeNode in="blur"/>
        <feMergeNode in="SourceGraphic"/>
      </feMerge>
    </filter>
  </defs>

  <title>Aesthetic Puzzles</title>
  <rect width="1600" height="900" fill="url(#bg)"/>
  <rect width="1600" height="900" fill="url(#glowLeft)"/>
  <rect width="1600" height="900" fill="url(#glowRight)"/>
  <rect width="1600" height="900" fill="url(#glowGold)"/>

  <g opacity="0.46">
