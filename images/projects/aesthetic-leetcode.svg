    <radialGradient id="glowLeft" cx="0" cy="0" r="1" gradientUnits="userSpaceOnUse" gradientTransform="translate(420 420) rotate(90) scale(360 440)">
      <stop offset="0" stop-color="#65F5FF" stop-opacity="0.22"/>
      <stop offset="1" stop-color="#65F5FF" stop-opacity="0"/>
    </radialGradient>

    <radialGradient id="glowRight" cx="0" cy="0" r="1" gradientUnits="userSpaceOnUse" gradientTransform="translate(1160 440) rotate(90) scale(390 460)">
      <stop offset="0" stop-color="#FF7BDC" stop-opacity="0.18"/>
      <stop offset="1" stop-color="#FF7BDC" stop-opacity="0"/>
    </radialGradient>

    <linearGradient id="strokeMain" x1="420" y1="180" x2="1170" y2="720" gradientUnits="userSpaceOnUse">
      <stop offset="0" stop-color="#65F5FF"/>
      <stop offset="0.34" stop-color="#7F8CFF"/>
      <stop offset="0.66" stop-color="#FF7BDC"/>
      <stop offset="1" stop-color="#FFE36E"/>
