<svg width="1600" height="900" viewBox="0 0 1600 900" fill="none" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="1600" y2="900" gradientUnits="userSpaceOnUse">
      <stop offset="0" stop-color="#070B1D"/>
      <stop offset="0.48" stop-color="#101633"/>
      <stop offset="1" stop-color="#1A0F2E"/>
    </linearGradient>

    <radialGradient id="glowLeft" cx="0" cy="0" r="1" gradientUnits="userSpaceOnUse" gradientTransform="translate(420 430) rotate(90) scale(360 460)">
      <stop offset="0" stop-color="#65F5FF" stop-opacity="0.22"/>
      <stop offset="1" stop-color="#65F5FF" stop-opacity="0"/>
    </radialGradient>

    <radialGradient id="glowRight" cx="0" cy="0" r="1" gradientUnits="userSpaceOnUse" gradientTransform="translate(1180 450) rotate(90) scale(390 470)">
      <stop offset="0" stop-color="#FF7BDC" stop-opacity="0.18"/>
      <stop offset="1" stop-color="#FF7BDC" stop-opacity="0"/>
    </radialGradient>

    <linearGradient id="wave" x1="250" y1="0" x2="1350" y2="0" gradientUnits="userSpaceOnUse">
      <stop offset="0" stop-color="#5EF2FF"/>
      <stop offset="0.24" stop-color="#7F8CFF"/>
      <stop offset="0.5" stop-color="#D26CFF"/>
      <stop offset="0.76" stop-color="#FF7FD3"/>
      <stop offset="1" stop-color="#FFD86F"/>
    </linearGradient>

    <linearGradient id="bars" x1="0" y1="160" x2="0" y2="740" gradientUnits="userSpaceOnUse">
      <stop offset="0" stop-color="#8AF8FF" stop-opacity="0.95"/>
      <stop offset="0.33" stop-color="#9E91FF" stop-opacity="0.9"/>
      <stop offset="0.66" stop-color="#FF84E3" stop-opacity="0.88"/>
      <stop offset="1" stop-color="#FFE384" stop-opacity="0.95"/>
    </linearGradient>

    <filter id="blurSoft" x="-50%" y="-50%" width="200%" height="200%">
      <feGaussianBlur stdDeviation="18" result="blur"/>
      <feMerge>
        <feMergeNode in="blur"/>
        <feMergeNode in="SourceGraphic"/>
      </feMerge>
    </filter>

    <filter id="glow" x="-200%" y="-200%" width="400%" height="400%">
      <feGaussianBlur stdDeviation="8" result="blur"/>
      <feMerge>
        <feMergeNode in="blur"/>
        <feMergeNode in="SourceGraphic"/>
      </feMerge>
    </filter>
  </defs>

  <rect width="1600" height="900" fill="url(#bg)"/>
  <rect width="1600" height="900" fill="url(#glowLeft)"/>
  <rect width="1600" height="900" fill="url(#glowRight)"/>

  <g opacity="0.45">
